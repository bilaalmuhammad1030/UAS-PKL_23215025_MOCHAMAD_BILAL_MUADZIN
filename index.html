<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Admin | MA Mambaul Hikmah</title>

    <link rel="stylesheet" href="login.css">
</head>

<body>

    <main class="login-container">

        <section class="login-card">

            <div class="logo-placeholder">
                MA
            </div>

            <h1>Login Admin</h1>

            <h2>
                Sistem Administrasi dan Pengelolaan
                Soal Ujian Semester
            </h2>

            <p class="nama-sekolah">
                MA Mambaul Hikmah
            </p>

            <form id="formLogin">

                <div class="form-group">
                    <label for="username">Username</label>

                    <input
                        type="text"
                        id="username"
                        placeholder="Masukkan username"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>

                    <div class="password-wrapper">
                        <input
                            type="password"
                            id="password"
                            placeholder="Masukkan password"
                            autocomplete="current-password"
                            required
                        >

                        <button
                            type="button"
                            id="lihatPassword"
                            class="btn-lihat"
                        >
                            Lihat
                        </button>
                    </div>
                </div>

                <p id="pesanLogin" class="pesan-login"></p>

                <button type="submit" class="btn-login">
                    Masuk ke Sistem
                </button>

            </form>

            <div class="info-login">
                <p>Username demo: <strong>admin</strong></p>
                <p>Password demo: <strong>admin123</strong></p>
            </div>

            <p class="copyright">
                Mochamad Bilal Muadzin — 23215025
            </p>

        </section>

    </main>

    <script src="login.js"></script>

</body>
</html>
